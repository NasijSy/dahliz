# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: NasijSy/dahliz
  branch: main
  base_url: https://sveltia-cms-auth.imadaldoj-official.workers.dev

locale: ar

i18n:
  structure: single_file
  locales: [ar]
  default_locale: ar

media_folder: static/media
public_folder: /media

collections:
  - name: article_types
    label: Article Types
    label_singular: Article Type
    folder: src/lib/data/article-types
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: slug
    format: json
    extension: json
    fields:
      - name: slug
        label: Slug
        widget: string
        pattern: ['^[a-z0-9-]+$', 'Slug must contain only lowercase letters, numbers, and hyphens']
      - name: label
        label: Label
        widget: string
  - name: articles
    label: Articles
    label_singular: Article
    folder: src/lib/data/articles
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: slug
    format: json
    extension: json
    i18n: true
    media_folder: /static/media/articles/{{slug}}
    public_folder: /media/articles/{{slug}}
    fields:
      - name: slug
        label: Slug
        widget: string
        i18n: duplicate
        pattern: ['^[a-z0-9-]+$', 'Slug must contain only lowercase letters, numbers, and hyphens']

      - name: title
        label: Title
        widget: string
        i18n: true

      - name: summary
        label: Summary
        widget: text
        i18n: true

      - name: type
        label: Type
        widget: relation
        collection: article_types
        search_fields: [label, slug]
        value_field: slug
        display_fields: [label]
        i18n: duplicate

      - name: coverImage
        label: Cover Image
        widget: image
        required: false
        i18n: duplicate

      - name: datePublished
        label: Publication Date
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        i18n: duplicate
        default: '{{now}}'

      - name: author
        label: Author
        widget: string
        required: false
        i18n: true

      - name: body
        label: Content
        widget: markdown
        i18n: true

  - name: tags
    label: Tags and Categories
    label_singular: Tag
    folder: src/lib/data/tags
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: slug
    format: json
    extension: json
    fields:
      - name: slug
        label: Slug
        widget: string
        pattern: ['^[a-z0-9-]+$', 'Slug must contain only lowercase letters, numbers, and hyphens']
      - name: label
        label: Label
        widget: string

  - name: cases
    label: Documented Cases
    label_singular: Case
    folder: src/lib/data/cases
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: slug
    format: json
    extension: json
    i18n: true
    # Set the default media folder at collection level so nested fields inherit it
    media_folder: /static/media/cases/{{slug}}
    public_folder: /media/cases/{{slug}}
    fields:
      - name: slug
        label: Slug
        widget: string
        i18n: duplicate
        pattern: ['^[a-z0-9-]+$', 'Slug must contain only lowercase letters, numbers, and hyphens']

      - name: title
        label: Title
        widget: string
        i18n: true

      - name: dateAdded
        label: Date Added
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        i18n: duplicate
        default: '{{now}}'
        hint: Automatically set on creation

      - name: type
        label: Type
        widget: select
        options:
          - { label: Misinformation, value: misinfo }
          - { label: Rumor, value: rumor }
          - { label: Incitement, value: hate }
          - { label: Fraud, value: fraud }
          - { label: Violence, value: violence }
          - { label: Defamation, value: defamation }
        i18n: duplicate

      - name: profiles
        label: Case Appearances by Profile
        widget: list
        required: false
        i18n: true
        fields:
          - name: username
            label: Profile
            widget: relation
            collection: profiles
            search_fields: [name, username]
            value_field: username
            display_fields: [name, username]
            i18n: duplicate

          - name: description
            label: Profile-Specific Description
            widget: text
            i18n: true

          - name: source
            label: Sources (Claim)
            widget: list
            i18n: true
            fields:
              - name: url
                label: URL
                widget: string
                required: false
              - name: archiveURL
                label: Archive URL
                widget: string
                required: false
              - name: date
                label: Date
                widget: datetime
                format: YYYY-MM-DD
                date_format: YYYY-MM-DD
                time_format: false
                required: false
              - name: label
                label: Description
                widget: string
                required: false
                i18n: true
              - name: mediaType
                label: Media Type
                widget: select
                required: false
                options:
                  - { label: Image, value: image }
                  - { label: Video, value: video }
              - name: mediaPath
                label: Media
                widget: file
                # Inherits collection-level media_folder: /static/media/cases/{{slug}}
                required: false

          - name: analysis
            label: Analysis (Fact)
            widget: list
            required: false
            i18n: true
            fields:
              - name: url
                label: URL
                widget: string
                required: false
              - name: archiveURL
                label: Archive URL
                widget: string
                required: false
              - name: date
                label: Date
                widget: datetime
                format: YYYY-MM-DD
                date_format: YYYY-MM-DD
                time_format: false
                required: false
              - name: label
                label: Description
                widget: string
                required: false
                i18n: true
              - name: mediaType
                label: Media Type
                widget: select
                required: false
                options:
                  - { label: Image, value: image }
                  - { label: Video, value: video }
              - name: mediaPath
                label: Media
                widget: file
                required: false

  - name: profiles
    label: Profiles
    label_singular: Profile
    folder: src/lib/data/profiles
    create: true
    delete: true
    slug: "{{username}}"
    identifier_field: username
    format: json
    extension: json
    i18n: true
    fields:
      - name: username
        label: Username
        widget: string
        i18n: duplicate
        pattern: ['^[a-z0-9_]+$', 'Username must contain only lowercase letters, numbers, and underscores']

      - name: name
        label: Name
        widget: string
        i18n: true

      - name: type
        label: Profile Type
        widget: select
        options:
          - { label: Organization, value: org }
          - { label: Person, value: person }
          - { label: Anonymous, value: anon }
          - { label: Bot, value: bot }
        i18n: duplicate

      - name: classification
        label: Reliability Classification
        widget: select
        i18n: duplicate
        options:
          - { label: "Relatively Reliable - Limited errors", value: reliable }
          - { label: "Unreliable - Repeatedly shares rumors without verification", value: unreliable }
          - { label: "Disinformation - Deliberate and systematic spread of false information", value: disinformation }
        hint: Based on account behavior and track record

      - name: dateAdded
        label: Date Added
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        i18n: duplicate
        default: '{{now}}'
        hint: Automatically set on creation

      - name: lastUpdated
        label: Last Updated
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        i18n: duplicate
        default: '{{now}}'
        hint: Update this field manually when making changes

      - name: summary
        label: Summary
        widget: text
        i18n: true

      - name: imagePath
        label: Profile Image
        widget: image
        media_folder: /static/media/profiles/{{username}}
        public_folder: /media/profiles/{{username}}
        i18n: duplicate

      - name: platformLinks
        label: Platform Links
        widget: list
        i18n: duplicate
        fields:
          - name: platform
            label: Platform
            widget: select
            options:
              - { label: Twitter / X, value: twitter }
              - { label: Facebook, value: facebook }
              - { label: YouTube, value: youtube }
              - { label: Telegram, value: telegram }
              - { label: Instagram, value: instagram }
              - { label: Website, value: website }
          - name: alias
            label: Account Name
            widget: string
          - name: url
            label: URL
            widget: string

      - name: tags
        label: Tags
        widget: relation
        collection: tags
        multiple: true
        required: false
        search_fields: [label, slug]
        value_field: slug
        display_fields: [label]
        i18n: duplicate

  - name: about
    label: About Page
    files:
      - name: content
        label: Content
        file: src/lib/data/about.md
        i18n: true
        fields:
          - name: body
            label: Content
            widget: markdown
            i18n: true