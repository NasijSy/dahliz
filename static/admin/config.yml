# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: NasijSy/dahliz
  branch: main
  base_url: https://sveltia-cms-auth.imadaldoj-official.workers.dev

locale: ar

i18n:
  structure: single_file
  locales: [ar]
  default_locale: ar

media_folder: static/media
public_folder: /media

collections:
  - name: article_types
    label: أنواع المقالات
    label_singular: نوع مقالة
    folder: src/lib/data/article-types
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: slug
    format: json
    extension: json
    fields:
      - name: slug
        label: المعرف (Slug)
        widget: string
        pattern: ['^[a-z0-9-]+$', 'يجب أن يكون المعرف بأحرف صغيرة وأرقام وشرطة فقط']
      - name: label
        label: الاسم
        widget: string
  - name: articles
    label: المقالات
    label_singular: مقالة
    folder: src/lib/data/articles
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: slug
    format: json
    extension: json
    i18n: true
    media_folder: /static/media/articles/{{slug}}
    public_folder: /media/articles/{{slug}}
    fields:
      - name: slug
        label: المعرف (Slug)
        widget: string
        i18n: duplicate
        pattern: ['^[a-z0-9-]+$', 'يجب أن يكون المعرف بأحرف صغيرة وأرقام وشرطة فقط']

      - name: title
        label: العنوان
        widget: string
        i18n: true

      - name: summary
        label: الملخص
        widget: text
        i18n: true

      - name: type
        label: النوع
        widget: relation
        collection: article_types
        search_fields: [label, slug]
        value_field: slug
        display_fields: [label]
        i18n: duplicate

      - name: coverImage
        label: صورة الغلاف
        widget: image
        required: false
        i18n: duplicate

      - name: datePublished
        label: تاريخ النشر
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        i18n: duplicate
        default: '{{now}}'

      - name: author
        label: الكاتب
        widget: string
        required: false
        i18n: true

      - name: body
        label: المحتوى
        widget: markdown
        i18n: true

  - name: tags
    label: التصنيفات والوسوم
    label_singular: وسم
    folder: src/lib/data/tags
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: slug
    format: json
    extension: json
    fields:
      - name: slug
        label: المعرف (Slug)
        widget: string
        pattern: ['^[a-z0-9-]+$', 'يجب أن يكون المعرف بأحرف صغيرة وأرقام وشرطة فقط']
      - name: label
        label: الاسم
        widget: string

  - name: cases
    label: الحالات الموثقة
    label_singular: حالة
    folder: src/lib/data/cases
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: slug
    format: json
    extension: json
    i18n: true
    # Set the default media folder at collection level so nested fields inherit it
    media_folder: /static/media/cases/{{slug}}
    public_folder: /media/cases/{{slug}}
    fields:
      - name: slug
        label: المعرف (Slug)
        widget: string
        i18n: duplicate
        pattern: ['^[a-z0-9-]+$', 'يجب أن يكون المعرف بأحرف صغيرة وأرقام وشرطة فقط']

      - name: title
        label: العنوان
        widget: string
        i18n: true

      - name: dateAdded
        label: تاريخ الإضافة
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        i18n: duplicate
        default: '{{now}}'
        hint: يُضبط تلقائياً عند الإنشاء

      - name: type
        label: النوع
        widget: select
        options:
          - { label: تضليل, value: misinfo }
          - { label: إشاعة, value: rumor }
          - { label: تحريض, value: hate }
          - { label: احتيال, value: fraud }
          - { label: عنف, value: violence }
          - { label: تشهير, value: defamation }
        i18n: duplicate

      - name: profiles
        label: ظهور الحالة عند الحسابات
        widget: list
        i18n: true
        fields:
          - name: username
            label: الحساب
            widget: relation
            collection: profiles
            search_fields: [name, username]
            value_field: username
            display_fields: [name, username]
            i18n: duplicate

          - name: description
            label: الوصف الخاص بهذا الحساب
            widget: text
            i18n: true

          - name: source
            label: المصادر (الإدعاء)
            widget: list
            i18n: true
            fields:
              - name: url
                label: الرابط
                widget: string
                required: false
              - name: archiveURL
                label: رابط الأرشيف
                widget: string
                required: false
              - name: date
                label: التاريخ
                widget: datetime
                format: YYYY-MM-DD
                date_format: YYYY-MM-DD
                time_format: false
                required: false
              - name: label
                label: الوصف
                widget: string
                required: false
                i18n: true
              - name: mediaType
                label: نوع الوسيط
                widget: select
                required: false
                options:
                  - { label: صورة, value: image }
                  - { label: فيديو, value: video }
              - name: mediaPath
                label: الوسيط
                widget: file
                # Inherits collection-level media_folder: /static/media/cases/{{slug}}
                required: false

          - name: analysis
            label: التحليل (الحقيقة)
            widget: list
            required: false
            i18n: true
            fields:
              - name: url
                label: الرابط
                widget: string
                required: false
              - name: archiveURL
                label: رابط الأرشيف
                widget: string
                required: false
              - name: date
                label: التاريخ
                widget: datetime
                format: YYYY-MM-DD
                date_format: YYYY-MM-DD
                time_format: false
                required: false
              - name: label
                label: الوصف
                widget: string
                required: false
                i18n: true
              - name: mediaType
                label: نوع الوسيط
                widget: select
                required: false
                options:
                  - { label: صورة, value: image }
                  - { label: فيديو, value: video }
              - name: mediaPath
                label: الوسيط
                widget: file
                required: false

  - name: profiles
    label: الحسابات
    label_singular: حساب
    folder: src/lib/data/profiles
    create: true
    delete: true
    slug: "{{username}}"
    identifier_field: username
    format: json
    extension: json
    i18n: true
    fields:
      - name: username
        label: اسم المستخدم
        widget: string
        i18n: duplicate
        pattern: ['^[a-z0-9_]+$', 'يجب أن يكون اسم المستخدم بأحرف صغيرة وأرقام وشرطة سفلية فقط']

      - name: name
        label: الاسم
        widget: string
        i18n: true

      - name: type
        label: نوع الحساب
        widget: select
        options:
          - { label: منظمة, value: org }
          - { label: شخص, value: person }
          - { label: مجهول, value: anon }
          - { label: بوت, value: bot }
        i18n: duplicate

      - name: classification
        label: درجة الموثوقية
        widget: select
        i18n: duplicate
        options:
          - { label: "موثوق نسبياً - أخطاء محدودة", value: reliable }
          - { label: "غير موثوق - تداول شائعات بشكل متكرر دون تحقق", value: unreliable }
          - { label: "مضلل - نشر معلومات مضللة بشكل متعمد وممنهج", value: disinformation }
        hint: بناء على سلوك الحساب وسجله

      - name: dateAdded
        label: تاريخ الإضافة
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        i18n: duplicate
        default: '{{now}}'
        hint: يُضبط تلقائياً عند الإنشاء

      - name: lastUpdated
        label: آخر تحديث
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        i18n: duplicate
        default: '{{now}}'
        hint: حدّث هذا الحقل يدوياً عند إجراء تغييرات

      - name: summary
        label: الوصف
        widget: text
        i18n: true

      - name: imagePath
        label: صورة الملف الشخصي
        widget: image
        media_folder: /static/media/profiles/{{username}}
        public_folder: /media/profiles/{{username}}
        i18n: duplicate

      - name: platformLinks
        label: روابط المنصات
        widget: list
        i18n: duplicate
        fields:
          - name: platform
            label: المنصة
            widget: select
            options:
              - { label: تويتر / X, value: twitter }
              - { label: فيسبوك, value: facebook }
              - { label: يوتيوب, value: youtube }
              - { label: تيليغرام, value: telegram }
              - { label: إنستغرام, value: instagram }
              - { label: موقع إلكتروني, value: website }
          - name: alias
            label: اسم الحساب
            widget: string
          - name: url
            label: الرابط
            widget: string

      - name: cases
        label: الحالات الموثقة
        widget: list
        i18n: duplicate
        hint: "ابحث عن الحالة وحددها"
        field:
          name: item
          label: الحالة
          widget: relation
          collection: cases
          search_fields: [title, slug]
          value_field: slug
          display_fields: [title]

      - name: tags
        label: الوسوم
        widget: relation
        collection: tags
        multiple: true
        required: false
        search_fields: [label, slug]
        value_field: slug
        display_fields: [label]
        i18n: duplicate

  - name: about
    label: صفحة عن المشروع
    files:
      - name: content
        label: المحتوى
        file: src/lib/data/about.md
        i18n: true
        fields:
          - name: body
            label: المحتوى
            widget: markdown
            i18n: true